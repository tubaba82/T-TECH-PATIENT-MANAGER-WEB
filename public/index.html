<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Allahu Jallah Spiritual Clinic</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f1419">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <!-- LOGIN -->
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:48px;margin-bottom:8px">🏥</div>
        <h2 style="color:var(--accent);font-size:18px">Allahu Jallah Spiritual Clinic</h2>
        <p style="color:var(--dim);font-size:12px">Patient Management System v1.1</p>
      </div>
      <div class="form-group"><label>Username</label><input id="login-user" placeholder="admin"></div>
      <div class="form-group"><label>Password</label><input id="login-pass" type="password" placeholder="••••••"></div>
      <button class="btn btn-primary" id="login-btn" style="width:100%;padding:12px">Login</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div class="app hidden" id="app">
    <!-- Mobile header -->
    <header class="mobile-header">
      <button class="menu-btn" id="menu-toggle">☰</button>
      <span class="brand-text">Allahu Jallah</span>
      <button class="btn-icon" id="logout-btn" title="Logout">🚪</button>
    </header>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="brand-text">Allahu Jallah</span>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-footer">
        <span id="user-display"></span>
        <button class="btn-icon" onclick="doLogout()">🚪</button>
      </div>
    </aside>
    <div class="sidebar-overlay hidden" id="sidebar-overlay"></div>

    <main class="main"><div id="page-container"></div></main>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header"><h3 id="modal-title"></h3><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="app.js"></script>
</body>
</html>
