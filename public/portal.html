<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Patient Portal — Allahu Jallah Spiritual Clinic</title>
  <meta name="theme-color" content="#0f1419">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#0f1419;color:#e8edf2;min-height:100vh;padding:16px}
    .container{max-width:500px;margin:0 auto}
    .header{text-align:center;padding:24px 0 20px}
    .header h1{color:#0ea5e9;font-size:18px;margin-bottom:4px}
    .header p{color:#7b8fa3;font-size:12px}
    .card{background:#1c2938;border:1px solid #2d3f50;border-radius:12px;padding:20px;margin-bottom:16px}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:11px;color:#7b8fa3;margin-bottom:4px;text-transform:uppercase}
    .form-group input{width:100%;padding:12px;border:1px solid #2d3f50;border-radius:8px;background:#0f1419;color:#e8edf2;font-size:15px}
    .form-group input:focus{border-color:#0ea5e9;outline:none}
    .btn{width:100%;padding:14px;background:#0ea5e9;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
    .btn:hover{background:#0284c7}
    .btn:active{transform:scale(0.98)}
    .section{margin-top:16px}
    .section h3{font-size:14px;color:#0ea5e9;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #2d3f50}
    .item{background:#243447;border-radius:8px;padding:12px;margin-bottom:8px}
    .item .title{font-weight:600;font-size:13px}
    .item .detail{font-size:11px;color:#7b8fa3;margin-top:3px}
    .badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600}
    .badge-scheduled{background:rgba(14,165,233,0.15);color:#0ea5e9}
    .badge-confirmed{background:rgba(34,197,94,0.15);color:#22c55e}
    .badge-completed{background:rgba(34,197,94,0.15);color:#22c55e}
    .badge-no_show{background:rgba(239,68,68,0.15);color:#ef4444}
    .badge-cancelled{background:rgba(239,68,68,0.15);color:#ef4444}
    .badge-pending{background:rgba(245,158,11,0.15);color:#f59e0b}
    .badge-received{background:rgba(34,197,94,0.15);color:#22c55e}
    .badge-abnormal{background:rgba(239,68,68,0.15);color:#ef4444}
    .badge-paid{background:rgba(34,197,94,0.15);color:#22c55e}
    .badge-unpaid{background:rgba(239,68,68,0.15);color:#ef4444}
    .empty{text-align:center;padding:20px;color:#7b8fa3;font-size:13px}
    .queue-alert{background:rgba(14,165,233,0.1);border:2px solid #0ea5e9;border-radius:12px;padding:16px;text-align:center;margin-bottom:16px}
    .queue-alert .number{font-size:32px;font-weight:700;color:#0ea5e9}
    .queue-alert .label{font-size:12px;color:#7b8fa3;margin-top:4px}
    .welcome{font-size:16px;font-weight:600;margin-bottom:16px}
    .tab-bar{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto}
    .tab{flex:1;padding:10px 8px;text-align:center;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:#243447;color:#7b8fa3;white-space:nowrap}
    .tab.active{background:#0ea5e9;color:#fff}
    .hidden{display:none}
    .back-btn{background:none;border:none;color:#0ea5e9;font-size:13px;cursor:pointer;padding:8px 0;margin-bottom:12px}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="/logo.png" alt="Logo" style="width:56px;height:56px;border-radius:50%;object-fit:cover;margin-bottom:8px">
      <h1>Allahu Jallah Spiritual Clinic</h1>
      <p>Patient Portal</p>
    </div>

    <!-- SEARCH -->
    <div id="search-view" class="card">
      <div class="form-group">
        <label>Enter Your Patient ID or Phone Number</label>
        <input id="search-input" placeholder="PT-00001 or 08012345678" autocomplete="off">
      </div>
      <button class="btn" onclick="lookup()">Check My Records</button>
      <p style="text-align:center;margin-top:12px;font-size:11px;color:#7b8fa3">
        Your Patient ID is on your clinic card. Ask reception if unsure.
      </p>
    </div>

    <!-- RESULTS -->
    <div id="results-view" class="hidden">
      <button class="back-btn" onclick="goBack()">← Back to Search</button>
      <div id="welcome-msg"></div>
      <div id="queue-section"></div>
      <div class="tab-bar">
        <div class="tab active" onclick="showTab('appts')">📅 Appointments</div>
        <div class="tab" onclick="showTab('rx')">💊 Prescriptions</div>
        <div class="tab" onclick="showTab('labs')">🧪 Lab Results</div>
        <div class="tab" onclick="showTab('visit')">🩺 Last Visit</div>
      </div>
      <div id="tab-content"></div>
    </div>

    <!-- ERROR -->
    <div id="error-view" class="hidden">
      <div class="card" style="text-align:center">
        <p style="font-size:32px;margin-bottom:12px">😔</p>
        <p id="error-msg" style="color:#ef4444"></p>
        <button class="btn" style="margin-top:16px" onclick="goBack()">Try Again</button>
      </div>
    </div>
  </div>

  <script>
  let _data = null;

  async function lookup() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) { alert('Enter your Patient ID or phone number'); return; }
    try {
      const r = await fetch(`/api/portal/lookup?q=${encodeURIComponent(q)}`);
      const d = await r.json();
      if (!d.ok) { showError(d.error); return; }
      _data = d;
      showResults(d);
    } catch(e) { showError('Connection error. Please try again.'); }
  }

  function showResults(d) {
    document.getElementById('search-view').classList.add('hidden');
    document.getElementById('error-view').classList.add('hidden');
    document.getElementById('results-view').classList.remove('hidden');
    document.getElementById('welcome-msg').innerHTML = `<div class="welcome">Hello, ${d.patient.first_name}! 👋</div>`;
    // Queue position
    if (d.queue) {
      const status = d.queue.status === 'in_progress' ? '🔄 You are being seen now!' : `⏳ Your queue number: `;
      document.getElementById('queue-section').innerHTML = `<div class="queue-alert"><div class="number">#${d.queue.queue_number}</div><div class="label">${status}${d.queue.status === 'waiting' ? 'Please wait to be called' : 'Currently with doctor'}</div></div>`;
    } else {
      document.getElementById('queue-section').innerHTML = '';
    }
    showTab('appts');
  }

  function showTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['appts','rx','labs','visit'][i] === tab));
    const el = document.getElementById('tab-content');
    if (!_data) return;
    switch(tab) {
      case 'appts':
        el.innerHTML = _data.appointments.length === 0 ? '<div class="empty">No upcoming appointments</div>' :
          _data.appointments.map(a => `<div class="item"><div class="title">📅 ${a.date} at ${a.time}</div><div class="detail">${a.doctor ? 'Dr. ' + a.doctor + ' — ' : ''}${a.reason || 'General'}</div><span class="badge badge-${a.status}">${a.status}</span></div>`).join('');
        break;
      case 'rx':
        el.innerHTML = _data.prescriptions.length === 0 ? '<div class="empty">No prescriptions</div>' :
          _data.prescriptions.map(r => `<div class="item"><div class="title">💊 ${r.drug_name}</div><div class="detail">${r.dosage || ''} · ${r.duration || ''} · Qty: ${r.quantity} · ₦${r.price}</div><span class="badge badge-${r.paid ? 'paid' : 'unpaid'}">${r.paid ? 'Paid' : 'Unpaid'}</span></div>`).join('');
        break;
      case 'labs':
        el.innerHTML = _data.labs.length === 0 ? '<div class="empty">No lab results</div>' :
          _data.labs.map(l => `<div class="item"><div class="title">🧪 ${l.test_name}</div><div class="detail">${l.result || 'Awaiting result...'} · ${l.ordered_at ? l.ordered_at.split(' ')[0] : ''}</div><span class="badge badge-${l.status}">${l.status}</span></div>`).join('');
        break;
      case 'visit':
        if (!_data.lastVisit) { el.innerHTML = '<div class="empty">No visits recorded</div>'; break; }
        const v = _data.lastVisit;
        el.innerHTML = `<div class="item"><div class="title">🩺 ${v.visit_date ? v.visit_date.split(' ')[0] : ''}</div><div class="detail"><strong>Diagnosis:</strong> ${v.diagnosis || '—'}</div><div class="detail"><strong>Doctor:</strong> ${v.doctor || '—'}</div>${v.notes ? `<div class="detail"><strong>Notes:</strong> ${v.notes}</div>` : ''}</div>`;
        break;
    }
  }

  function showError(msg) {
    document.getElementById('search-view').classList.add('hidden');
    document.getElementById('results-view').classList.add('hidden');
    document.getElementById('error-view').classList.remove('hidden');
    document.getElementById('error-msg').textContent = msg;
  }

  function goBack() {
    document.getElementById('search-view').classList.remove('hidden');
    document.getElementById('results-view').classList.add('hidden');
    document.getElementById('error-view').classList.add('hidden');
    _data = null;
  }

  // Enter key to search
  document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });
  </script>
</body>
</html>
