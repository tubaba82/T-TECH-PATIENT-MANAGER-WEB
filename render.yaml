services:
  - type: web
    name: allahu-jallah-clinic
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /opt/render/project/data
    disk:
      name: clinic-data
      mountPath: /opt/render/project/data
      sizeGB: 1
